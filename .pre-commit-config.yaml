# Pre-commit hook configuration.
#
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run on demand against all files:
#   pre-commit run --all-files
#
# The hooks below mirror what CI enforces, so passing pre-commit means
# the ruff/format portion of CI will be green too. Tests are NOT run by
# pre-commit — they're too slow for every commit. CI catches test
# regressions.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        # gaia_bright.parquet is 80 MB — a documented exception.
        args: ["--maxkb=2048"]
