[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"
# app/ is the main package; scripts/ are one-off fetch tools.
src = ["app", "scripts", "tests"]

[tool.ruff.lint]
# Conservative starter set. `E` is pycodestyle, `F` is pyflakes, `I`
# enforces import ordering, `B` catches likely-bug idioms, `UP` nudges
# toward modern Python, `PLE` is the error subset of pylint. More rule
# groups can land once the baseline is clean.
select = ["E", "F", "I", "B", "UP", "PLE"]
ignore = [
    "E501",  # line-length handled by the formatter
    "B008",  # FastAPI depends on default-arg Depends() / Query()
]

[tool.ruff.lint.per-file-ignores]
# Tests regularly shadow builtins and redefine fixtures by name.
"tests/**" = ["F811", "F841"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
# Tolerant starter profile. The codebase has no type-annotation
# baseline yet; tightening lands incrementally. The `ignore_missing`
# flag is there because astropy/scipy/colour-demosaicing/bm3d/skimage
# don't all ship PEP 561 stubs.
ignore_missing_imports = true
check_untyped_defs = false
warn_redundant_casts = true
warn_unused_ignores = true
pretty = true
files = ["app"]
