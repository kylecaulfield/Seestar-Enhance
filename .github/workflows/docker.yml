name: Build and publish container image

# Push protection: rebuild on commits to main that actually change the
# image (Dockerfile, runtime code, deps), on every `v*.*.*` semver tag,
# and on demand via `workflow_dispatch` (e.g. after a base-image security
# update with no source change).
#
# Documentation-only commits (README, BACKLOG, HOSTING, CI workflow
# itself) shouldn't trigger a multi-arch rebuild — the image is identical
# and ghcr's storage isn't free. The `paths` filter below excludes
# samples/, docs/, run_*.py, *.md, and .github/** for that reason.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "backend/app/**"
      - "backend/requirements.txt"
      - "backend/pyproject.toml"
      - "frontend/**"
      - "!frontend/**/*.md"
      - ".dockerignore"
    tags: ["v*.*.*"]
  workflow_dispatch:

# The default GITHUB_TOKEN already has `packages: write` on the action's
# own repo; declaring it explicitly here makes the principle-of-least-
# privilege intent visible to reviewers.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # ghcr expects the image name to be lowercase; `github.repository`
  # already is on this repo but the expression handles casing anyway.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Multi-arch builds (amd64 + arm64) use QEMU for the non-native arch.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN is scoped to this workflow and is sufficient to
      # push to ghcr.io/<owner>/<repo>. No separate PAT required.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate standard tags + labels:
      #   - `latest` on default-branch pushes
      #   - `sha-<7>` on every build (immutable, useful for rollbacks)
      #   - `v1.2.3` plus `1.2` and `1` on semver tag pushes
      #   - OCI labels populated from git metadata so the ghcr page
      #     shows description, revision, and timestamps automatically.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # `push-by-digest=false`: publish the multi-arch manifest list
          # directly — what users expect from `docker pull ghcr.io/...`.
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache avoids rebuilding unchanged layers (node_modules,
          # pip wheels) across runs; `mode=max` caches intermediate
          # layers too, not just the final image.
          cache-from: type=gha
          cache-to: type=gha,mode=max
