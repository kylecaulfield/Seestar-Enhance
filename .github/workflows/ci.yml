name: CI

# Runs on every push to any branch and on every pull request. Keeps the
# main branch green and catches regressions before they merge.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # All pytest / ruff invocations assume the backend/ directory as
        # cwd (that's where pyproject.toml + requirements.txt live).
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # mypy is advisory for now — the codebase has no type-annotation
      # baseline yet. Flip to hard-fail once annotations are filled in
      # and the initial noise is triaged.
      - name: mypy
        continue-on-error: true
        run: mypy app

      # Pytest is split into two invocations so test_api (which runs
      # pipelines via the FastAPI ThreadPoolExecutor) gets its own
      # subprocess. In a single combined run, OMP / MKL helper
      # threads spawned by bm3d in the API worker pool corrupt state
      # for the subsequent direct-pipeline tests (test_pipeline,
      # test_golden), and pytest aborts with exit code 2 — see
      # https://github.com/kylecaulfield/Seestar-Enhance/actions/runs/24933312444
      # for the original failure. Locally the crash is masked by
      # larger RAM and a different MKL build; on the 4-core / 7 GB
      # GH runner the race triggers reliably.
      #
      # The thread-throttle env vars are belt-and-suspenders; the
      # process split is the real fix.
      # Diagnostic: -v shows each test name as it runs, -X faulthandler
      # prints a Python traceback on SIGSEGV/SIGABRT, --collect-only
      # first verifies imports work before any test runs.
      - name: Pytest — verify collection
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
          VECLIB_MAXIMUM_THREADS: "1"
        run: pytest --collect-only -q

      - name: Pytest — API tests (TestClient-based, isolated process)
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
          VECLIB_MAXIMUM_THREADS: "1"
        run: python -X faulthandler -m pytest tests/test_api.py -v --tb=long --durations=5

      - name: Pytest — everything else (incl. goldens)
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
          VECLIB_MAXIMUM_THREADS: "1"
        run: python -X faulthandler -m pytest tests/ --ignore=tests/test_api.py -v --tb=long --durations=10
