name: CI

# Runs on every push to any branch and on every pull request. Keeps the
# main branch green and catches regressions before they merge.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # All pytest / ruff invocations assume the backend/ directory as
        # cwd (that's where pyproject.toml + requirements.txt live).
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      # mypy is advisory for now — the codebase has no type-annotation
      # baseline yet. Flip to hard-fail once annotations are filled in
      # and the initial noise is triaged.
      - name: mypy
        continue-on-error: true
        run: mypy app

      # Pytest runs from backend/ per the pyproject.toml testpaths.
      # Golden-image tests auto-skip if the samples / catalog bundle
      # aren't present, so a clean checkout without LFS still runs
      # the 110 non-golden tests.
      #
      # The env vars throttle BLAS / OpenMP to one thread per process.
      # Without this, GH Actions runners exhibit a SIGABRT (pytest
      # exit code 2) when test_api runs a pipeline via the API thread
      # pool and then test_pipeline runs another pipeline in the
      # main thread — bm3d / OMP / MKL state gets corrupted across
      # the worker-thread → main-thread transition. Locally the
      # crash is masked by larger RAM and a different MKL build,
      # but on the 4-core / 7 GB runner the race triggers reliably.
      # Same approach our CLI uses in `_run_batch_parallel`.
      - name: Pytest
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
          VECLIB_MAXIMUM_THREADS: "1"
        run: pytest -q --durations=10
